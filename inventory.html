<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Инвентарь | Monopoly Project</title>
    <meta
      name="description"
      content="Инвентарь игрока в Monopoly Project с поиском предметов и пустым состоянием."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="is-ready inventory-page">
    <div class="page-shell">
      <header class="topbar">
        <nav class="nav">
          <a class="nav-link nav-link-primary" href="index.html">Начать игру</a>
          <a class="nav-link" href="editorial.html">Наша редакция</a>
          <a class="nav-link" href="friends.html">Друзья</a>
          <a class="nav-link is-current" href="inventory.html">Инвентарь</a>
          <a class="nav-link" href="market.html">Маркет</a>
        </nav>

        <div class="topbar-actions">
          <a class="icon-button" href="profile.html" aria-label="Профиль">
            <span class="icon icon-profile" aria-hidden="true"></span>
          </a>
          <button class="icon-button" type="button" aria-label="Настройки">
            <span class="icon icon-settings" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <main class="inventory-main">
        <section class="inventory-panel">
          <div class="inventory-head">
            <div>
              <p class="eyebrow">Inventory</p>
              <h1>Ваши игровые предметы.</h1>
            </div>

            <label class="inventory-search">
              <span>Поиск предметов по названию</span>
              <input
                id="inventorySearch"
                type="search"
                placeholder="Введите название предмета"
                autocomplete="off"
              />
            </label>
          </div>

          <section class="inventory-empty">
            <p class="inventory-empty-title">Инвентарь пока пуст.</p>
            <p class="inventory-empty-text">
              Перейдите на страницу “Маркет”, чтобы купить первые предметы и
              собрать свою коллекцию.
            </p>
            <a class="button" href="market.html">Перейти в Маркет</a>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
